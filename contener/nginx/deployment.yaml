apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web
  namespace: saliou-diop-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      containers:
        - name: nginx
          image: bitnami/nginx:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            # On monte uniquement le volume HTML dans /app
            - name: html-volume
              mountPath: /app
            # On monte uniquement le volume de config dans le dossier server_blocks
            - name: config-volume
              mountPath: /opt/bitnami/nginx/conf/server_blocks
      volumes:
        # On découpe le ConfigMap en deux volumes virtuels propres
        - name: html-volume
          configMap:
            name: nginx-config
            items:
              - key: index.html
                path: index.html
        - name: config-volume
          configMap:
            name: nginx-config
            items:
              - key: my_server.conf
                path: my_server.conf