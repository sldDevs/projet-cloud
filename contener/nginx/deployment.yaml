apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web
  namespace: saliou-diop-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      containers:
        - name: nginx
          image: bitnami/nginx:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            # On monte la page HTML dans le dossier /app
            - name: web-content
              mountPath: /app/index.html
              subPath: index.html
            # On monte la configuration Nginx au bon endroit pour Bitnami
            - name: web-content
              mountPath: /opt/bitnami/nginx/conf/server_blocks/my_server.conf
              subPath: my_server.conf
      volumes:
        - name: web-content
          configMap:
            name: nginx-config