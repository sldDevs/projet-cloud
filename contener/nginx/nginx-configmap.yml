apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: saliou-diop-dev
data:
  # 1. Le code de ton application Node.js
  app.js: |
    const express = require('express');
    const mysql = require('mysql2');
    const app = express();
    const port = 3000;

    app.get('/', (req, res) => {
        res.send(`
            <h1>🚀 Félicitations ! L'application fonctionne !</h1>
            <p>La configuration est enfin passée ! Le serveur Node.js est bien caché derrière Nginx.</p>
        `);
    });

    app.listen(port, () => {
        console.log(`Serveur Node.js démarré sur le port ${port}`);
    });

  # 2. La configuration Nginx (qui écoute sur 8080)
  nginx.conf: |
    server {
        listen 8080;
        server_name localhost;

        location / {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }