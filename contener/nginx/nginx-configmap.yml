apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: saliou-diop-dev
data:
  # 1. Le code HTML de ton site vitrine
  index.html: |
    <!DOCTYPE html>
    <html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Mon Site Vitrine</title>
        <style>
            body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
            h1 { color: #0066cc; }
        </style>
    </head>
    <body>
        <h1>🚀 Bienvenue sur mon site vitrine !</h1>
        <p>Ce site est hébergé de façon ultra-légère avec Nginx sur OpenShift.</p>
        <p>Aucune base de données, juste de la performance pure !</p>
    </body>
    </html>

  # 2. La configuration Nginx simplifiée
  my_server.conf: |
    server {
        listen 8080;
        server_name localhost;

        location / {
            root /app;
            index index.html;
        }
    }