# 1ère PARTIE : On force la création explicite du disque dur
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: image-fedora-firewall
  namespace: saliou-diop-dev
spec:
  sourceRef:
    kind: DataSource
    name: fedora
    namespace: openshift-virtualization-os-images
  storage:
    resources:
      requests:
        storage: 5Gi

---
# 2ème PARTIE : On crée la machine et on l'allume automatiquement
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm1-firewall
  namespace: saliou-diop-dev
spec:
  runStrategy: Manual # <-- La solution moderne d'OpenShift !
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm1-firewall
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 1Gi
        devices:
          disks:
            - name: boot
              disk:
                bus: virtio
              bootOrder: 1
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      tolerations:
        - effect: NoSchedule
          key: sandbox-cnv
          operator: Exists
      volumes:
        - name: boot
          dataVolume:
            name: image-fedora-firewall
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: firewall
              user: fedora
              password: "Password123!"
              chpasswd: { expire: False }
              ssh_pwauth: True