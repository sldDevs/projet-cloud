---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: image-ubuntu-web
  namespace: sld07-dev
spec:
  source:
    http:
      # URL de l'image Cloud Ubuntu 22.04 LTS
      url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm2-serveur-web
  namespace: sld07-dev
  labels:
    kubevirt.io/vm: vm2-serveur-web
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm2-serveur-web
    spec:
      domain:
        devices:
          disks:
            - name: boot
              disk:
                bus: virtio
            - name: cloudinit
              disk:
                bus: virtio
          interfaces:
            # Unique interface : connectée à la DMZ
            - name: dmz
              bridge: {}
        resources:
          requests:
            memory: 1Gi
            cpu: 2
      networks:
        - name: dmz
          multus:
            networkName: sld07-dev/reseau-dmz
      volumes:
        - name: boot
          dataVolume:
            name: image-ubuntu-web
        # --- CONFIGURATION AUTOMATIQUE (CLOUD-INIT) ---
        - name: cloudinit
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm2-web
              users:
                - name: ubuntu
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  shell: /bin/bash
                  # 🔴 REMPLACE CECI PAR TA VRAIE CLÉ SSH PUBLIQUE
                  ssh_authorized_keys:
                    - ssh-rsa AAAAB3Nza...votre_cle_publique... utilisateur@pc
              package_update: true
              package_upgrade: true
              packages:
                - nginx
                - nodejs
                - npm
                - git
                - curl
              write_files:
                # Configuration Nginx en Reverse Proxy
                - path: /etc/nginx/sites-available/default
                  content: |
                    server {
                        listen 80 default_server;
                        server_name _;
                        location / {
                            proxy_pass http://localhost:3000;
                            proxy_http_version 1.1;
                            proxy_set_header Upgrade $http_upgrade;
                            proxy_set_header Connection 'upgrade';
                            proxy_set_header Host $host;
                            proxy_cache_bypass $http_upgrade;
                        }
                    }
                # Création de l'application Node.js basique
                - path: /home/ubuntu/app/index.js
                  content: |
                    const express = require('express');
                    const app = express();
                    app.get('/', (req, res) => {
                      res.send('<h1>Bienvenue sur le Serveur Web de mon Projet de Fin de Module !</h1><p>Cette application Node.js est servie via Nginx.</p>');
                    });
                    app.listen(3000, () => {
                      console.log('App écoutant sur le port 3000');
                    });
                # Fichier package.json minimal
                - path: /home/ubuntu/app/package.json
                  content: |
                    {
                      "name": "app-web",
                      "version": "1.0.0",
                      "main": "index.js",
                      "dependencies": {
                        "express": "^4.18.2"
                      }
                    }
              runcmd:
                # Configuration réseau statique (Netplan) pour la DMZ
                # La passerelle est pfSense (192.168.100.254)
                - |
                  cat <<EOF > /etc/netplan/50-cloud-init.yaml
                  network:
                    version: 2
                    ethernets:
                      eth0:
                        dhcp4: no
                        addresses: [192.168.100.10/24]
                        gateway4: 192.168.100.254
                        nameservers:
                          addresses: [8.8.8.8, 8.8.4.4]
                  EOF
                  netplan apply
                - systemctl restart nginx
                # Installation et démarrage de l'app Node.js
                - cd /home/ubuntu/app && npm install
                # Lancement de l'app en arrière-plan (pour le test, mieux vaut un service systemd en prod)
                - nohup node /home/ubuntu/app/index.js > /home/ubuntu/app/app.log 2>&1 &